name: Intake AutoFix (SQL 2016 RTM)

on:
  push:
    paths:
      - 'intake/**'
  workflow_dispatch: {}

jobs:
  intake-autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Intake AutoFix
        run: |
          python3 tools/intake_autofix.py

      - name: Upload Proposed Modules
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proposed-modules
          path: proposed/**

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intake-report
          path: reports/**

      - name: Post Summary
        if: always()
        run: |
          if [ -f reports/summary.md ]; then
            cat reports/summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No summary generated." >> $GITHUB_STEP_SUMMARY
          fi
